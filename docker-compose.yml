services:
  pipeline:
    build: .
    image: dataguard-sg:latest
    container_name: dataguard_pipeline
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./contracts:/app/contracts
    command: ["python", "src/dataguard/main.py", "--n-rows", "500"]